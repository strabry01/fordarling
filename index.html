<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="For Bunny">
    <meta name="theme-color" content="#ffffff">

    <title>For Bunny</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Princess+Sofia&display=swap" rel="stylesheet">



</head>

<body>

    <!-- FIRST SCREEN -->

    <div class="first-screen" id="firstScreen">

        <div class="received">
            <img src="backgrounds/youhaverecieved.png" alt="You have received">
            <p class="letter-delivery-text">mensahe para sa iyo</p>
            <img src="smiski/delivery.png" class="delivery-img" alt="Delivery">
            <img src="buttons/okay.png" class="okay-btn" id="okayBtn">
        </div>

        <img src="smiski/bigsmis.png" class="big-smiski-first" alt="Big Smiski">

    </div>



    <!-- SECOND SCREEN -->

    <div class="second-screen" id="secondScreen">
        <img src="smiski/hbd.png" class="hbd-img" alt="Happy Birthday">
        
        <div class="cake-container">
            <img src="smiski/left.png" class="left-img" alt="Left">
            <img src="designs/cake.gif" class="cake-img" alt="Cake">
            <img src="smiski/right.png" class="right-img" alt="Right">
        </div>
    </div>



    <script src="script.js"></script>

</body>

</html>
