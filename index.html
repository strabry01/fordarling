<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="For Bunny">
    <meta name="theme-color" content="#ffffff">

    <title>For Bunny</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Princess+Sofia&display=swap" rel="stylesheet">



</head>

<body>
    <div id="rotateOverlay" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,0.95);color:#333;z-index:99999;text-align:center;padding:20px;font-size:18px;">Please rotate your device to landscape for the intended experience.</div>
    <noscript style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;color:#333;z-index:9999;text-align:center;padding:20px;">
        Please open this page in landscape mode and enable JavaScript for the intended experience.
    </noscript>

    <main id="appMain">

    <!-- FIRST SCREEN -->

    <div class="first-screen" id="firstScreen">

        <div class="received">
            <img src="backgrounds/youhaverecieved.png" alt="You have received">
            <p class="letter-delivery-text">mensahe para sa iyo</p>
            <img src="smiski/delivery.png" class="delivery-img" alt="Delivery">
            <img src="buttons/okay.png" class="okay-btn" id="okayBtn">
        </div>

        <img src="smiski/bigsmis.png" class="big-smiski-first" alt="Big Smiski">

    </div>



    <!-- SECOND SCREEN -->

    <div class="second-screen" id="secondScreen">
        <div class="cake-stage">
            <img src="smiski/hbd.png" class="hbd-img" alt="Happy Birthday">

            <div class="cake-container">
                <img src="smiski/left.png" class="left-img" alt="Left">
                <img src="designs/cake.gif" class="cake-img" alt="Cake">
                <img src="smiski/right.png" class="right-img" alt="Right">
            </div>
        </div> <!-- end .cake-stage -->

        <!-- book removed -->

    </div> <!-- end .second-screen -->

    </main>



    <script src="script.js"></script>

</body>

</html>
