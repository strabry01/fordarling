<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">

    <title>For Bunny</title>

    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Princess+Sofia&display=swap" rel="stylesheet">

    <style>
        body{
            width:100%;
            height:auto;

            background-image:url("backgrounds/bg.png");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            overflow:visible;

            font-family:Arial, sans-serif;
        }

        .cake-img{
            width:1200px;
            height:auto;
            display:block;
        }

        .second-screen{
            width:100%;
            height:auto;
            min-height:100vh;

            display:none;
            visibility:hidden;

            flex-direction:column;
            justify-content:flex-start;
            align-items:center;
            
            overflow-y:auto;
            overflow-x:hidden;
            
            padding-top:20px;
        }

        .second-screen.active{
            display:flex;
            visibility:visible;
        }

        .big-smiski{
            width:100%;
            height:auto;
            display:block;
            margin:0 auto;
            margin-top:-700px;
        }

        .hbd-img{
            width:600px;
            height:auto;
            display:block;
            margin:0 auto 20px auto;
            margin-top:50px;
        }

        .cake-container{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;
            margin:0 auto 0px auto;
            margin-top:-10px;
        }

        .left-img{
            width:400px;
            height:auto;
        }

        .right-img{
            width:400px;
            height:auto;
        }

        .received{
            width:400px;
            max-width:80%;

            animation:float 2s ease-in-out infinite;
            
            position:absolute;
            left:200px;
            top:15%;
            transform:translateY(-50%);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:10;
        }

        .big-smiski-first{
            width:100%;
            height:auto;
            position:relative;
            object-fit:contain;
            z-index:1;
            display:block;
            margin-top:-750px;
            margin-bottom:20px;
        }

        .first-screen{
            width:100%;
            height:auto;
            min-height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:flex-start;
            align-items:center;
            position:relative;

            gap:25px;
            
            overflow-y:auto;
            overflow-x:hidden;
        }
    </style>

</head>

<body>


    <!-- FIRST SCREEN -->

    <div class="first-screen" id="firstScreen">

        <div class="received">
            <img src="backgrounds/youhaverecieved.png" alt="You have received">
            <p class="letter-delivery-text">mensahe para sa iyo</p>
            <img src="smiski/delivery.png" class="delivery-img" alt="Delivery">
            <img src="buttons/okay.png" class="okay-btn" id="okayBtn">
        </div>

        <img src="smiski/bigsmis.png" class="big-smiski-first" alt="Big Smiski">

    </div>



    <!-- SECOND SCREEN -->

    <div class="second-screen" id="secondScreen">
        <img src="smiski/hbd.png" class="hbd-img" alt="Happy Birthday">
        
        <div class="cake-container">
            <img src="smiski/left.png" class="left-img" alt="Left">
            <img src="designs/cake.gif" class="cake-img" alt="Cake">
            <img src="smiski/right.png" class="right-img" alt="Right">
        </div>
    </div>



    <script src="script.js"></script>

</body>

</html>
